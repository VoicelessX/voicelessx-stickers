<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoicelessX Stickers</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0b0b12;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px 25px;
      background: #111;
    }

    .logo {
      font-weight: 800;
      font-size: 22px;
      color: #a855f7;
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
    }

    .hero h1 {
      font-size: 40px;
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #141422;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(124,58,237,0.4);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: #a855f7;
      font-weight: bold;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      border-radius: 10px;
      text-decoration: none;
      color: white;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: gray;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">VOICLESSX</div>
</header>

<section class="hero">
  <h1>VoicelessX Stickers</h1>
  <p>Premium stickers for gamers & creators 🔥</p>
</section>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Gaming Sticker</h3>
    <p class="price">₹49</p>
    <a class="btn" href="#">Buy Now</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Anime Sticker</h3>
    <p class="price">₹59</p>
    <a class="btn" href="#">Buy Now</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Funny Sticker</h3>
    <p class="price">₹39</p>
    <a class="btn" href="#">Buy Now</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Custom Sticker</h3>
    <p class="price">₹99</p>
    <a class="btn" href="#">Buy Now</a>
  </div>

</div>

<footer>
  © 2026 VoicelessX | All rights reserved
</footer>

</body>
  </html>
